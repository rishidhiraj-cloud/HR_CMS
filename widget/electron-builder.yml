appId: com.modienterprise.hrwidget
productName: HR Widget
copyright: Copyright © 2025 Modi Enterprise

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*
  - package.json

asarUnpack:
  - "node_modules/better-sqlite3/build/Release/*.node"

extraResources:
  - from: assets/trayIcon.png
    to: trayIcon.png
  - from: assets/trayIcon@2x.png
    to: trayIcon@2x.png

extraMetadata:
  main: dist/main/index.js

mac:
  category: public.app-category.business
  icon: assets/icon.png
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  hardenedRuntime: false

dmg:
  title: HR Widget
  window:
    width: 540
    height: 380

win:
  icon: assets/icon.png
  target:
    - target: msi
      arch:
        - x64
    - target: nsis
      arch:
        - x64

msi:
  # Stable GUID so future versions UPGRADE in place instead of installing twice.
  upgradeCode: 8F4A1C72-3B6E-4D5A-9E21-7C0F2A6B8D14
  warningsAsErrors: false
  perMachine: true          # install for all users (enterprise deploy); requires elevation
  runAfterFinish: true
  shortcutName: HR Widget

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: false
  createStartMenuShortcut: true
  shortcutName: HR Widget

publish: null
